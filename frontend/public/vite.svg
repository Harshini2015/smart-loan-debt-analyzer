<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    
    <!-- Accent Gradient 1 (Neon Violet to Cyan) -->
    <linearGradient id="primaryGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Accent Gradient 2 (Rose to Orange) -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#fb923c" />
    </linearGradient>

    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Card Background with rounded corners -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Subtle Ring of Light -->
  <rect x="12" y="12" width="488" height="488" rx="116" fill="none" stroke="url(#primaryGrad)" stroke-width="6" opacity="0.3" />

  <!-- Shield and Graph Icon (Representing Protection, Finance, Analysis) -->
  <g transform="translate(0, 10)">
    <!-- Glowing behind-the-scenes shield shadow -->
    <path d="M256 70 C340 70 380 110 380 110 C380 110 395 270 256 410 C117 270 132 110 132 110 C132 110 172 70 256 70 Z" 
          fill="none" stroke="url(#primaryGrad)" stroke-width="24" opacity="0.15" filter="url(#glow)" />

    <!-- Actual Shield Border -->
    <path d="M256 70 C340 70 380 110 380 110 C380 110 395 270 256 410 C117 270 132 110 132 110 C132 110 172 70 256 70 Z" 
          fill="none" stroke="url(#primaryGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Central Stress Trend Line & Percentage representation -->
    <!-- Heartbeat / Graph Path -->
    <path d="M170 260 L215 260 L235 210 L260 310 L280 230 L300 280 L342 280" 
          fill="none" stroke="url(#accentGrad)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
          
    <path d="M170 260 L215 260 L235 210 L260 310 L280 230 L300 280 L342 280" 
          fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
          
    <!-- Percentage Circles (Stylized) -->
    <circle cx="195" cy="180" r="24" fill="url(#primaryGrad)" />
    <circle cx="195" cy="180" r="10" fill="#ffffff" />
    
    <circle cx="317" cy="340" r="24" fill="url(#primaryGrad)" />
    <circle cx="317" cy="340" r="10" fill="#ffffff" />
  </g>
</svg>
